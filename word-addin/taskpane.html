<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pahawh Converter</title>

  <!-- Office JavaScript API — required for all Word add-ins -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <!-- Pahawh font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Pahawh+Hmong&family=DM+Mono:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <!-- Pahawh conversion library -->
  <script src="pahawh-converter.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #FBBC09;
      --gold-dk: #D99D00;
      --ink:     #1A1209;
      --paper:   #FDF8EE;
      --cream:   #F5EDD8;
      --muted:   #9B8B6A;
      --border:  #E4D9C0;
      --red:     #C0392B;
      --green:   #27AE60;
    }

    html, body {
      height: 100%;
      font-family: 'DM Mono', 'Segoe UI', monospace;
      background: var(--paper);
      color: var(--ink);
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      background: var(--ink);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-badge {
      width: 28px; height: 28px;
      background: var(--gold);
      border-radius: 6px;
      display: grid; place-items: center;
      font-family: 'Noto Sans Pahawh Hmong', sans-serif;
      font-size: 13px;
      color: var(--ink);
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      color: white;
      letter-spacing: -0.2px;
    }
    .logo-text em { font-style: italic; color: var(--gold); }

    /* ── Body ── */
    .body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Direction toggle ── */
    .dir-bar {
      display: flex;
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      padding: 3px;
      position: relative;
    }

    .dir-btn {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      padding: 6px 8px;
      border: none;
      background: transparent;
      border-radius: 999px;
      cursor: pointer;
      color: var(--muted);
      position: relative;
      z-index: 1;
      transition: color 0.2s;
      white-space: nowrap;
      text-align: center;
    }
    .dir-btn.active { color: var(--ink); font-weight: 500; }

    .dir-pill {
      position: absolute;
      top: 3px; bottom: 3px; left: 3px;
      width: calc(50% - 3px);
      background: var(--gold);
      border-radius: 999px;
      transition: transform 0.22s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
    }
    .dir-pill.right { transform: translateX(100%); }

    /* ── Instruction ── */
    .instruction {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
      padding: 10px 12px;
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: 8px;
    }
    .instruction strong { color: var(--ink); }

    /* ── Leeg badge ── */
    .leeg-row {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
    }
    .leeg-row.visible { display: flex; }
    .leeg-badge {
      background: var(--gold);
      color: var(--ink);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    /* ── Action buttons ── */
    .btn {
      width: 100%;
      padding: 11px 16px;
      border: none;
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--gold);
      color: var(--ink);
      font-weight: 500;
    }
    .btn-primary:hover:not(:disabled) { background: var(--gold-dk); }

    .btn-secondary {
      background: white;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { border-color: var(--ink); color: var(--ink); }

    /* ── Preview panel ── */
    .preview-wrap {
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .preview-wrap.visible { display: flex; }

    .preview-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .preview-box {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-family: 'Noto Sans Pahawh Hmong', sans-serif;
      font-size: 15px;
      line-height: 1.9;
      color: var(--ink);
      min-height: 60px;
      max-height: 180px;
      overflow-y: auto;
      word-break: break-word;
    }
    .preview-box.is-rpa {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
    }
    .preview-box:empty::before {
      content: 'Preview will appear here…';
      color: var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
    }

    /* ── Status message ── */
    .status {
      font-size: 11px;
      padding: 8px 12px;
      border-radius: 8px;
      display: none;
      line-height: 1.5;
    }
    .status.visible { display: block; }
    .status.success { background: #f0faf4; color: var(--green); border: 1px solid #a8dbb8; }
    .status.error   { background: #fdf0ef; color: var(--red);   border: 1px solid #f0b8b3; }
    .status.info    { background: var(--cream); color: var(--muted); border: 1px solid var(--border); }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1.5px solid var(--border);
      margin: 2px 0;
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      font-size: 10px;
      color: var(--border);
      letter-spacing: 0.06em;
      text-align: center;
      border-top: 1.5px solid var(--border);
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--paper);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-badge">𖬖</div>
    <span class="logo-text">Pahawh <em>Converter</em></span>
  </div>

  <div class="body">

    <!-- Direction toggle -->
    <div class="dir-bar" id="dirBar">
      <div class="dir-pill" id="dirPill"></div>
      <button class="dir-btn active" id="btnRtP" onclick="setDirection(false)">RPA → Pahawh</button>
      <button class="dir-btn"        id="btnPtR" onclick="setDirection(true)">Pahawh → RPA</button>
    </div>

    <!-- Instruction -->
    <div class="instruction" id="instruction">
      <strong>Select</strong> Hmong RPA text in your document, then click <strong>Convert Selection</strong>.
      The selected text will be replaced with Pahawh Unicode and the font will be set automatically.
    </div>

    <!-- Leeg detection -->
    <div class="leeg-row" id="leegRow">
      <span class="leeg-badge">Moob Leeg</span>
      <span>Leeg dialect detected in selection</span>
    </div>

    <!-- Preview -->
    <div class="preview-wrap" id="previewWrap">
      <div class="preview-label">Preview</div>
      <div class="preview-box" id="previewBox"></div>
    </div>

    <!-- Status -->
    <div class="status" id="status"></div>

    <!-- Primary action -->
    <button class="btn btn-primary" id="btnConvert" onclick="convertSelection()">
      Convert Selection
    </button>

    <!-- Secondary actions -->
    <button class="btn btn-secondary" id="btnPreview" onclick="previewSelection()">
      Preview Conversion
    </button>

    <hr class="divider">

    <button class="btn btn-secondary" onclick="convertAll()">
      Convert Entire Document
    </button>

  </div>

  <div class="footer">
    Pahawh Platform · v2.0.0 · MIT License
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
